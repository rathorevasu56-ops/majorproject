
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon Clone</title>
  <link rel="stylesheet" href="amazon.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">amazon</div>

    <div class="search-bar">
      <input type="text" placeholder="Search Amazon">
      <button>🔍</button>
    </div>

    <div class="nav-links">
      <span>Account</span>
      <span>Orders</span>
      <span>🛒 Cart</span>
    </div>
  </nav>

  <!-- Menu -->
  <div class="menu">
    <span>All</span>
    <span>Electronics</span>
    <span>Fashion</span>
    <span>Home</span>
    <span>Deals</span>
  </div>

  <!-- Hero Section -->
  <section class="hero"></section>

  <!-- Products -->
  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
      <h3>Smartphone</h3>
      <p class="price">₹15,999</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
      <h3>Headphones</h3>
      <p class="price">₹1,999</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
      <h3>Laptop</h3>
      <p class="price">₹55,000</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
      <h3>Tablet</h3>
      <p class="price">₹25,000</p>
      <button>Add to Cart</button>
    </div>

  </section>

</body>
</html>
